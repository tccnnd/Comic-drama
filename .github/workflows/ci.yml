name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      docker_build:
        description: "Run optional Docker image build validation"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONUNBUFFERED: "1"
      COVERAGE_THRESHOLD: "0"
      VIDEO_FALLBACK_MODE: "report"
      VIDEO_PROVIDER: "local"
      KEYFRAME_PROVIDER: "local"
      LLM_API_KEY: ""
      OPENAI_API_KEY: ""
      COMFYUI_SSH_PASSWORD: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Validate requirements file
        shell: bash
        run: |
          test -s requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile high-risk Python files
        run: |
          python -m py_compile \
            scripts/run_workflow.py \
            backend/project_runtime.py \
            backend/app.py \
            video_providers.py \
            scripts/video_provider_adapters.py

      - name: Run pytest with coverage
        run: |
          python -m pytest -p no:cacheprovider --basetemp data/tmp_pytest_ci \
            --cov=. \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage.xml \
            --cov-fail-under="$COVERAGE_THRESHOLD" \
            tests

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 7

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check frontend syntax
        run: |
          node --check frontend/app.js
          node --check frontend/render.js

      - name: Run frontend helper tests
        run: |
          node tests/test_review_console_helpers.mjs

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.docker_build == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build --pull --no-cache -t comic-drama-workflow:ci .
